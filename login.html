<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HRZN — Sign In</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="favicon-180.png" sizes="180x180">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;}
body{-webkit-text-size-adjust:100%;background:#080808;color:#e8e8e8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
@media(max-width:768px){
  body{-webkit-text-size-adjust:100%;align-items:flex-start;padding:env(safe-area-inset-top,20px) 16px env(safe-area-inset-bottom,20px);min-height:100dvh;}
  .auth-wrap{width:100%;max-width:100%;margin:auto 0;padding:28px 20px;}
}
body.light{background:#f5f4f1;color:#111;}
.auth-wrap{width:100%;max-width:420px;padding:24px;}
.logo{display:block;width:150px;margin:0 auto 28px;}
.card{background:#0f0f0f;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:28px;}
body.light .card{background:#fff;border-color:rgba(0,0,0,0.07);}
.card-title{font-size:18px;font-weight:300;margin-bottom:4px;}
.card-sub{font-size:12px;color:#666;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:#666;margin-bottom:5px;letter-spacing:0.05em;}
.field input{width:100%;background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px 14px;font-size:13px;color:#e8e8e8;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
body.light .field input{background:#f5f4f1;border-color:rgba(0,0,0,0.1);color:#111;}
.field input:focus{border-color:rgba(201,168,76,0.5);}
.btn-primary{width:100%;background:#C9A84C;color:#000;border:none;border-radius:8px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.9;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.06);}
body.light .divider-line{background:rgba(0,0,0,0.08);}
.divider-text{font-size:11px;color:#444;}
.err{font-size:11px;color:#e05555;margin-top:8px;min-height:16px;}
.success{font-size:11px;color:#4caf7d;margin-top:8px;}
.link-row{text-align:center;margin-top:16px;font-size:12px;color:#666;}
.link-row a{color:#C9A84C;text-decoration:none;}
.link-row a:hover{text-decoration:underline;}
.badge{text-align:center;margin-top:20px;font-size:10px;color:#333;letter-spacing:0.15em;text-transform:uppercase;}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);}
.step-dot.active{background:#C9A84C;}
.step-dot.done{background:rgba(201,168,76,0.4);}</style>
</head>
<body>
<div id="upgrade-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(76,175,125,0.15);border-bottom:1px solid rgba(76,175,125,0.3);padding:10px 20px;text-align:center;font-size:12px;color:#4caf7d;">
  🎉 Payment successful! Sign in to access your dashboard.
</div>
<div class="auth-wrap">
  <img class="logo" src="hrzn-logo-footer.png" alt="HRZN"/>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your HRZN dashboard</div>

    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@restaurant.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"/>
    </div>

    <div style="text-align:right;margin-top:-8px;margin-bottom:12px;">
      <a href="forgot.html" style="font-size:11px;color:#666;text-decoration:none;">Forgot password?</a>
    </div>

    <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign In</button>
    <div class="err" id="err"></div>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
    <button onclick="window.location.href='dashboard.html?demo=true'" style="width:100%;background:transparent;border:1px solid rgba(255,255,255,0.08);color:#999;border-radius:8px;padding:12px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;" onmouseover="this.style.borderColor='rgba(201,168,76,0.3)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">👀 View Demo</button>
    <div class="link-row" style="margin-top:12px;">
      Don't have an account? <a href="signup.html">Start free trial →</a>
    </div>
  </div>
  <div class="badge">HRZN AI · AI Business Operator</div>
</div>

<script>
// Show upgrade success banner
if (new URLSearchParams(window.location.search).get('upgraded') === 'true') {
  document.getElementById('upgrade-banner').style.display = 'block';
}

const SUPABASE_URL = 'https://kkxsntywxvgpjiuaniuc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_vwR5ZxytRXriGjsIFSUvBg_uUH21z8U';

async function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signin-btn');
  const err = document.getElementById('err');

  if (!email || !password) { err.textContent = 'Please fill in all fields.'; return; }

  btn.textContent = 'Signing in...';
  btn.disabled = true;
  err.textContent = '';

  try {
    const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (data.access_token) {
      localStorage.setItem('hrzn_token', data.access_token);
      localStorage.setItem('hrzn_refresh', data.refresh_token);
      localStorage.setItem('hrzn_user', JSON.stringify(data.user));
      // Load user's cloud data before going to dashboard
      btn.textContent = 'Loading your data...';
      try {
        const syncR = await fetch('/api/sync-data', {
          headers: { 'Authorization': 'Bearer ' + data.access_token }
        });
        const syncData = await syncR.json();
        if (syncData.data) {
          // Only restore from cloud if nothing exists locally
          if (syncData.data.salesData && !localStorage.getItem('hrzn-data-csv')) {
            const salesRestored = { ...syncData.data.salesData, _filename: null, _restoredFromCloud: true };
            localStorage.setItem('hrzn-data-csv', JSON.stringify(salesRestored));
            localStorage.setItem('hrzn-sales-data', JSON.stringify(salesRestored));
          }
          if (syncData.data.menuData && !localStorage.getItem('hrzn-data-items')) {
            const cachedSet = JSON.parse(localStorage.getItem('hrzn-settings') || '{}');
            const origFname = syncData.data.menuData._filename || cachedSet._cachedItemsFilename || null;
            const restored = {
              ...syncData.data.menuData,
              _filename: origFname || null,
              _restoredFromCloud: !origFname
            };
            localStorage.setItem('hrzn-data-items', JSON.stringify(restored));
          }
          if (syncData.data.laborData && !localStorage.getItem('hrzn-data-employees')) {
            localStorage.setItem('hrzn-data-employees', JSON.stringify(syncData.data.laborData));
          }
          if (syncData.data.guestsData && !localStorage.getItem('hrzn-data-guests')) {
            localStorage.setItem('hrzn-data-guests', JSON.stringify({...syncData.data.guestsData, _restoredFromCloud: true}));
          }
          if (syncData.data.ordersData && !localStorage.getItem('hrzn-data-orders')) {
            localStorage.setItem('hrzn-data-orders', JSON.stringify({...syncData.data.ordersData, _restoredFromCloud: true}));
          }
          if (syncData.data.discountsData && !localStorage.getItem('hrzn-data-discounts')) {
            localStorage.setItem('hrzn-data-discounts', JSON.stringify({...syncData.data.discountsData, _restoredFromCloud: true}));
          }
          if (syncData.data.business) {
            const existing = JSON.parse(localStorage.getItem('hrzn-settings') || '{}');
            const updated = {
              ...existing,
              businessName: syncData.data.business.name || existing.businessName,
              bizName: syncData.data.business.name || existing.bizName,
              location: syncData.data.business.location || existing.location,
              bizLocation: syncData.data.business.location || existing.bizLocation,
              plan: syncData.data.business.plan || existing.plan || 'trial',
              subscription_status: syncData.data.business.subscription_status || existing.subscription_status || 'trial'
            };
            if (syncData.data.settings) {
              const s = syncData.data.settings;
              updated.targets = {
                labor: s.target_labor_pct, food: s.target_food_cost_pct,
                revenue: s.target_weekly_revenue, check: s.target_avg_check,
                doordash: s.target_doordash_pct, discount: s.target_discount_pct || 5
              };
              // Restore the manual labor RATE (estimate) if one was synced. Shaped
              // like HRZN.setLaborRate() output so getLaborRateMeta() reads it as a
              // manual value. Kept in sync with the restore in hrzn-data.js.
              if (s.labor_rate_pct != null && !updated.laborRate) {
                updated.laborRate = { value: +s.labor_rate_pct, mode: 'fallback', _restoredFromCloud: true };
              }
              if (s.items_csv_filename) {
                updated._cachedItemsFilename = s.items_csv_filename;
              }
            }
            localStorage.setItem('hrzn-settings', JSON.stringify(updated));
          }
        }
      } catch(e) { console.warn('Sync failed, using local data'); }
      // Check if there's a pending plan or next page
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      if (next === 'pricing' || localStorage.getItem('hrzn_pending_plan')) {
        window.location.href = 'pricing.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      err.textContent = data.error_description || data.msg || 'Invalid email or password.';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
